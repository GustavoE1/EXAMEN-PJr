{% extends "base.html" %}

{% block content %}

<h3 class="mb-3">Ventas</h3>

<div class="card mb-4">
    <div class="card-header">Agregar producto a la venta</div>
    <div class="card-body">
        <div class="row">
            <div class="col-md-6 mb-3">
                <label>Producto</label>
                <select id="producto_id" class="form-select"></select>
            </div>

            <div class="col-md-3 mb-3">
                <label>Cantidad</label>
                <input type="number" id="cantidad" class="form-control">
            </div>

            <div class="col-md-3 mb-3 d-flex align-items-end">
                <button class="btn btn-primary w-100" onclick="agregarProductoVenta()">
                    Agregar
                </button>
            </div>
        </div>
    </div>
</div>

<div class="card mb-4">
    <div class="card-header">Detalle de venta</div>
    <div class="card-body">
        <table class="table table-bordered">
            <thead>
                <tr>
                    <th>Producto</th>
                    <th>Cantidad</th>
                    <th>Precio unitario</th>
                    <th>Subtotal</th>
                </tr>
            </thead>
            <tbody id="tabla-venta"></tbody>
        </table>

        <h5 class="text-end">Total: S/. <span id="total">0.00</span></h5>

        <button class="btn btn-success" onclick="registrarVenta()">
            Registrar venta
        </button>
    </div>
</div>

<div class="alert d-none" id="mensaje"></div>

{% endblock %}

{% block scripts %}
<script src="/static/js/ventas.js"></script>
{% endblock %}
